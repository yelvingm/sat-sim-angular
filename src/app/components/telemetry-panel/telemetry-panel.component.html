<div class="telemetry-panel">
  <div class="section-label">FLEET TELEMETRY</div>
  
  <div class="card-grid">
    <mat-card *ngFor="let sat of state()?.satellites" class="sat-telem-card">
      <mat-card-header>
        <div mat-card-avatar class="sat-avatar" [style.background-color]="sat.color"></div>
        <mat-card-title>{{ sat.name.toUpperCase() }}</mat-card-title>
        <mat-card-subtitle [class]="getSatStatusClass(sat.status)">
          {{ sat.status }}
        </mat-card-subtitle>
      </mat-card-header>
      
      <mat-card-content>
        <div class="telem-grid">
          <div class="telem-item">
            <span class="label">CLOCK ERR</span>
            <span class="value" [class.warn]="sat.clockError > 5">{{ sat.clockError.toFixed(2) }}m</span>
          </div>
          <div class="telem-item">
            <span class="label">POS ERR</span>
            <span class="value" [class.warn]="sat.posError > 10">{{ sat.posError.toFixed(2) }}m</span>
          </div>
          <div class="telem-item">
            <span class="label">MAX STALE</span>
            <span class="value">{{ sat.maxStale.toFixed(0) }}s</span>
          </div>
          <div class="telem-item">
            <span class="label">VELOCITY</span>
            <span class="value">{{ sat.velocity }}km/s</span>
          </div>
        </div>
        <app-sat-error-plot [satName]="sat.name" />
      </mat-card-content>
    </mat-card>
  </div>

  <div class="global-summary mat-elevation-z1" *ngIf="state()?.anyDenial">
    <div class="section-label">ACTIVE ALERTS</div>
    <div class="alert-item" *ngFor="let line of state()?.denialLines">
      <mat-icon [color]="line.type === 'gnss' ? 'warn' : 'accent'">warning</mat-icon>
      <span>{{ line.text }}</span>
    </div>
  </div>
</div>
